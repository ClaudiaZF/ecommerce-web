<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Cliente</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .form-agregar {
            max-width: 400px;
            margin: 40px auto;
            padding: 32px 28px 24px 28px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.13);
        }
        .form-agregar h2 {
            color: #1976d2;
            text-align: center;
            margin-bottom: 24px;
        }
        .form-agregar label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: #333;
        }
        .form-agregar input {
            width: 100%;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #bfcbe3;
            font-size: 1rem;
            margin-bottom: 14px;
            background: #f7fafd;
        }
        .form-agregar button {
            width: 100%;
            background: #00897b;
            color: #fff;
            border: none;
            border-radius: 7px;
            padding: 12px 0;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .form-agregar button:hover {
            background: #00695c;
        }
        .form-agregar .btn-pedido-nav {
            margin: 0 8px;
        }
    </style>
</head>
<body>
    <div class="form-agregar">
        <h2>Agregar Cliente</h2>
        <form id="form-cliente" action="php/registrar_cliente.php" method="POST" onsubmit="return validarCliente()">
            <label>Nombre:</label>
            <input type="text" name="nombre" id="nombre_cliente" required>
            <label>Email:</label>
            <input type="email" name="email" id="email_cliente" required>
            <label>Teléfono:</label>
            <input type="text" name="telefono" id="telefono_cliente">
            <label>Dirección:</label>
            <input type="text" name="direccion" id="direccion_cliente">
            <button type="submit">Registrar Cliente</button>
        </form>
        <div style="text-align:center; margin-top:24px;">
            <a href="index.php" class="btn-pedido-nav">Volver al inicio</a>
        </div>
    </div>
    <script>
    function validarCliente() {
        if (document.getElementById('nombre_cliente').value.trim() === '') {
            alert('El nombre del cliente es obligatorio.');
            return false;
        }
        if (document.getElementById('email_cliente').value.trim() === '') {
            alert('El email es obligatorio.');
            return false;
        }
        return true;
    }
    </script>
</body>
</html>
